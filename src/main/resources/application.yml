spring:
  liquibase:
    enabled: false
  datasource:
    url: jdbc:postgresql://localhost:5432/marketgo
    username: marketgo_user
    password: asadoye5050

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    properties:
      hibernate:
        format_sql: true

  mail:
    host: smtp.gmail.com
    port: 587
    username: your@gmail.com
    password: your-app-password
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

# ── JWT ────────────────────────────────────────────────────────────────────────
app:
  jwt:
    secret: YOUR_BASE64_ENCODED_SECRET_AT_LEAST_44_CHARS_LONG==
    expiration: 86400000

  # Frontend URL
  frontend-url: http://localhost:3000

# AWS S3
aws:
  s3:
    bucket: your-marketgo-bucket
    region: us-east-1
  credentials:
    access-key: YOUR_AWS_ACCESS_KEY
    secret-key: YOUR_AWS_SECRET_KEY